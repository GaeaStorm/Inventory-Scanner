kind = "mobile"
previewPath = "/"
title = "Stock Scanner"
version = "1.0.0"
id = "artifacts/scanner-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20396

[services.development]
run = "pnpm --filter @workspace/scanner-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scanner-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/scanner-app", "run", "serve" ]

[services.env]
PORT = "20396"
BASE_PATH = "/"
