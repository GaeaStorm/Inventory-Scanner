name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  INVENTORY_GMAIL_APP_PASSWORD: "macq czti zdyx sxjt"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Configure Electron workspace
        run: node artifacts/desktop-app/scripts/setup-workspace.mjs

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build installer
        run: pnpm --filter @workspace/desktop-app dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: inventory-scanner-${{ matrix.name }}
          path: artifacts/desktop-app/release/**
          if-no-files-found: error
